name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "const APP_VERSION = '${VERSION}';" > js/version.js
          sed -i "s|const CACHE = .*|const CACHE = 'multiblaster-v${VERSION}';|" sw.js
          echo "Deploying version ${VERSION}"

      - name: Copy site files
        run: |
          mkdir _site
          cp index.html style.css manifest.json sw.js CNAME _site/
          cp -r js _site/js
          cp -r icons _site/icons

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
