name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default: least-privilege. Jobs override what they need.
permissions:
  contents: read

jobs:
  # ── Phase 1: runs on every push EXCEPT chore:release ─────────────────────
  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    # Unique group per run — never cancelled by the chore:release push it creates.
    concurrency:
      group: bump-${{ github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # DEPLOY_TOKEN (PAT) re-triggers the workflow so deploy runs under the chore:release commit.
          # Falls back to github.token if secret not set — add DEPLOY_TOKEN secret to enable re-trigger.
          token: ${{ secrets.DEPLOY_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version and push chore:release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          echo "// Version injected by CI from package.json — do not edit manually." > js/version.js
          echo "const APP_VERSION = '${VERSION}';" >> js/version.js
          sed -i "s|const CACHE = .*|const CACHE = 'multiblaster-v${VERSION}';|" sw.js

          git add package.json js/version.js sw.js
          git commit -m "chore: release v${VERSION}"
          git push

  # ── Phase 2: runs only on chore:release commits ───────────────────────────
  unit:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  e2e:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  deploy:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    needs: [unit, e2e]
    runs-on: ubuntu-latest
    # Cancel any queued deploy if a newer chore:release commit arrives.
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Copy site files
        run: |
          mkdir _site
          cp index.html style.css manifest.json sw.js CNAME _site/
          cp -r js _site/js
          cp -r icons _site/icons

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
