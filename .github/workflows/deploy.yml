name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default: least-privilege. Jobs override what they need.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Phase 1: run on every push EXCEPT the chore:release commit ──────────
  test:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  bump-version:
    needs: test
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use DEPLOY_TOKEN (PAT) so the chore:release push re-triggers this workflow.
          # Falls back to GITHUB_TOKEN if the secret isn't set (re-trigger won't fire in that case).
          token: ${{ secrets.DEPLOY_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version and push chore:release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Increment patch in package.json (0.7.0 → 0.7.1, etc.)
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")

          # Inject into the two derived files
          echo "// Version injected by CI from package.json — do not edit manually." > js/version.js
          echo "const APP_VERSION = '${VERSION}';" >> js/version.js
          sed -i "s|const CACHE = .*|const CACHE = 'multiblaster-v${VERSION}';|" sw.js

          # Push with PAT — this WILL re-trigger the workflow, which then runs the deploy job
          git add package.json js/version.js sw.js
          git commit -m "chore: release v${VERSION}"
          git push

  # ── Phase 2: deploy only when the chore:release commit lands ────────────
  deploy:
    if: "startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Copy site files
        run: |
          mkdir _site
          cp index.html style.css manifest.json sw.js CNAME _site/
          cp -r js _site/js
          cp -r icons _site/icons

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
