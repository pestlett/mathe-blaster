<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a0a1a"/>

  <!-- 2×2 operation grid — 176×176 cells, 8px gap, 76px margin -->

  <!-- + Addition — green -->
  <rect x="76"  y="76"  width="176" height="176" rx="22" fill="#22c55e"/>
  <rect x="124" y="153" width="80"  height="22"  rx="5"  fill="white"/>
  <rect x="153" y="124" width="22"  height="80"  rx="5"  fill="white"/>

  <!-- − Subtraction — red -->
  <rect x="260" y="76"  width="176" height="176" rx="22" fill="#ef4444"/>
  <rect x="308" y="153" width="80"  height="22"  rx="5"  fill="white"/>

  <!-- × Multiplication — gold -->
  <rect x="76"  y="260" width="176" height="176" rx="22" fill="#f7c948"/>
  <line x1="136" y1="320" x2="192" y2="376" stroke="#0a0a1a" stroke-width="20" stroke-linecap="round"/>
  <line x1="192" y1="320" x2="136" y2="376" stroke="#0a0a1a" stroke-width="20" stroke-linecap="round"/>

  <!-- ÷ Division — blue -->
  <rect x="260" y="260" width="176" height="176" rx="22" fill="#3b82f6"/>
  <rect x="308" y="337" width="80"  height="22"  rx="5"  fill="white"/>
  <circle cx="348" cy="302" r="13" fill="white"/>
  <circle cx="348" cy="382" r="13" fill="white"/>
</svg>
