<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Onboarding Screen -->
  <div id="screen-onboarding" class="screen active">
    <div class="onboarding-card">
      <h1 class="game-title">Multiplication<br><span class="title-accent">Blaster!</span></h1>
      <div class="form-group">
        <label for="input-name">Your Name</label>
        <input type="text" id="input-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="input-age">Your Age</label>
        <input type="number" id="input-age" placeholder="Age" min="1" max="132" style="width:100px">
      </div>
      <div class="form-group">
        <label>Choose Your Theme</label>
        <div class="theme-cards">
          <div class="theme-card active" data-theme="space">
            <div class="theme-preview space-preview"></div>
            <span>Space</span>
          </div>
          <div class="theme-card" data-theme="ocean">
            <div class="theme-preview ocean-preview"></div>
            <span>Ocean</span>
          </div>
          <div class="theme-card" data-theme="sky">
            <div class="theme-preview sky-preview"></div>
            <span>Sky</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Tables</label>
        <div class="tables-tabs">
          <button class="tables-tab active" data-tab="range">Range</button>
          <button class="tables-tab" data-tab="single">One Table</button>
        </div>
        <div id="tables-range-panel">
          <div class="range-values">
            <span>From <strong id="range-min-val">1</strong></span>
            <span>To <strong id="range-max-val">10</strong></span>
          </div>
          <div class="range-container">
            <input type="range" id="range-min" min="1" max="12" value="1" class="range-slider">
            <input type="range" id="range-max" min="1" max="12" value="10" class="range-slider">
          </div>
          <div class="range-ticks">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span>
            <span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span>
          </div>
        </div>
        <div id="tables-single-panel" hidden>
          <div class="table-grid" id="table-grid">
            <button class="table-num-btn" data-val="1">1</button>
            <button class="table-num-btn" data-val="2">2</button>
            <button class="table-num-btn" data-val="3">3</button>
            <button class="table-num-btn" data-val="4">4</button>
            <button class="table-num-btn" data-val="5">5</button>
            <button class="table-num-btn" data-val="6">6</button>
            <button class="table-num-btn" data-val="7">7</button>
            <button class="table-num-btn" data-val="8">8</button>
            <button class="table-num-btn" data-val="9">9</button>
            <button class="table-num-btn active" data-val="10">10</button>
            <button class="table-num-btn" data-val="11">11</button>
            <button class="table-num-btn" data-val="12">12</button>
          </div>
          <div class="setting-note" style="margin-top:8px">Only questions from the <span id="single-table-label">10×</span> table</div>
        </div>
        <!-- hidden inputs kept for JS compatibility -->
        <input type="hidden" id="focus-mode-toggle" value="0">
        <input type="hidden" id="focus-table" value="10">
      </div>
      <div class="form-group">
        <label>Mode</label>
        <div class="mode-btns">
          <button class="mode-btn active" data-mode="normal">Normal</button>
          <button class="mode-btn" data-mode="practice">Practice</button>
        </div>
        <span class="setting-note" id="mode-note">Lose lives when objects hit the bottom</span>
      </div>
      <div class="form-group">
        <label>Difficulty</label>
        <div class="difficulty-btns">
          <button class="diff-btn" data-diff="easy">Easy</button>
          <button class="diff-btn active" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
      </div>
      <div class="form-group">
        <label>Hint after <span id="hint-threshold-display">3</span> wrong tries</label>
        <input type="range" id="hint-threshold" min="1" max="5" value="3" class="range-slider" style="max-width:200px">
        <span class="setting-note">Shows a dot-grid picture when stuck</span>
      </div>
      <button id="btn-start" class="btn-primary">Let's Go!</button>
      <button id="btn-daily" class="btn-daily">⚡ Daily Challenge</button>
      <button id="btn-dashboard" class="btn-secondary" style="width:100%;margin-top:8px">📊 Parent Dashboard</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud-overlay">
      <div id="hud-left">
        <div id="hud-name"></div>
        <div id="hud-score">Score: <span id="score-val">0</span></div>
      </div>
      <div id="hud-center">
        <div id="hud-level">Level <span id="level-val">1</span></div>
        <div id="hud-tables"></div>
      </div>
      <div id="hud-right">
        <div id="hud-lives"></div>
        <button id="btn-pause" title="Pause" aria-label="Pause game">⏸</button>
      </div>
    </div>
    <div id="level-up-banner"></div>
    <div id="pause-overlay">
      <div class="pause-card">
        <div class="pause-title">Paused</div>
        <button id="btn-resume" class="btn-primary">Resume</button>
        <button id="btn-pause-menu" class="btn-secondary">Back to Menu</button>
      </div>
    </div>
    <div id="answer-area">
      <div id="combo-display"></div>
      <div id="input-wrapper">
        <input type="number" id="answer-input" placeholder="Answer..." autocomplete="off" inputmode="numeric">
        <button id="btn-mic" title="Voice input" aria-label="Toggle voice input">🎤</button>
        <button id="btn-fire">Fire!</button>
      </div>
      <div id="try-again-msg"></div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="screen-gameover" class="screen">
    <div class="overlay-card">
      <h2>Game Over!</h2>
      <div id="gameover-stats"></div>
      <div id="gameover-missed"></div>
      <div id="gameover-achievements"></div>
      <div class="overlay-btns">
        <button id="btn-play-again" class="btn-primary">Play Again</button>
        <button id="btn-leaderboard" class="btn-secondary">Leaderboard</button>
        <button id="btn-achievements" class="btn-secondary">Achievements</button>
      </div>
    </div>
  </div>

  <!-- Leaderboard Screen -->
  <div id="screen-leaderboard" class="screen">
    <div class="overlay-card wide">
      <h2>Leaderboard</h2>
      <div id="leaderboard-badge"></div>
      <div id="leaderboard-table-wrap">
        <table id="leaderboard-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Score</th>
              <th>Level</th>
              <th>Accuracy</th>
              <th>Theme</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
      <div class="overlay-btns">
        <button id="btn-play-again-lb" class="btn-primary">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Parent Dashboard Screen -->
  <div id="screen-dashboard" class="screen">
    <div class="overlay-card wide">
      <h2>Parent Dashboard</h2>
      <div id="dashboard-player"></div>
      <div id="dashboard-summary"></div>
      <div id="dashboard-chart-wrap">
        <canvas id="dashboard-chart"></canvas>
      </div>
      <div id="dashboard-table-detail"></div>
      <div class="overlay-btns">
        <button id="btn-back-dashboard" class="btn-primary">Back</button>
      </div>
    </div>
  </div>

  <!-- Achievements Screen -->
  <div id="screen-achievements" class="screen">
    <div class="overlay-card wide">
      <h2>Achievements</h2>
      <div id="leaderboard-table-wrap">
        <table id="achievements-table">
          <tbody id="achievements-body"></tbody>
        </table>
      </div>
      <div class="overlay-btns">
        <button id="btn-back-achievements" class="btn-primary">Back</button>
      </div>
    </div>
  </div>

  <script src="js/voice.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/objects.js"></script>
  <script src="js/targeting.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
